<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <!-- Connection lines -->
  <g stroke="#8BA4AD" stroke-width="1" opacity="0.6">
    <!-- input → hidden -->
    <line x1="10" y1="12" x2="28" y2="8"/>
    <line x1="10" y1="12" x2="28" y2="22"/>
    <line x1="10" y1="12" x2="28" y2="36"/>
    <line x1="10" y1="12" x2="28" y2="50"/>
    <line x1="10" y1="30" x2="28" y2="8"/>
    <line x1="10" y1="30" x2="28" y2="22"/>
    <line x1="10" y1="30" x2="28" y2="36"/>
    <line x1="10" y1="30" x2="28" y2="50"/>
    <line x1="10" y1="48" x2="28" y2="8"/>
    <line x1="10" y1="48" x2="28" y2="22"/>
    <line x1="10" y1="48" x2="28" y2="36"/>
    <line x1="10" y1="48" x2="28" y2="50"/>
    <!-- hidden → output -->
    <line x1="28" y1="8" x2="46" y2="20"/>
    <line x1="28" y1="8" x2="46" y2="40"/>
    <line x1="28" y1="22" x2="46" y2="20"/>
    <line x1="28" y1="22" x2="46" y2="40"/>
    <line x1="28" y1="36" x2="46" y2="20"/>
    <line x1="28" y1="36" x2="46" y2="40"/>
    <line x1="28" y1="50" x2="46" y2="20"/>
    <line x1="28" y1="50" x2="46" y2="40"/>
  </g>

  <!-- Input layer (3 nodes, red) -->
  <circle cx="10" cy="12" r="4" fill="#E63946"/>
  <circle cx="10" cy="30" r="4" fill="#E63946"/>
  <circle cx="10" cy="48" r="4" fill="#E63946"/>

  <!-- Hidden layer (4 nodes, blue) -->
  <circle cx="28" cy="8" r="4" fill="#2A6FA8"/>
  <circle cx="28" cy="22" r="4" fill="#2A6FA8"/>
  <circle cx="28" cy="36" r="4" fill="#2A6FA8"/>
  <circle cx="28" cy="50" r="4" fill="#2A6FA8"/>

  <!-- Output layer (2 nodes, green) -->
  <circle cx="46" cy="20" r="4" fill="#2A9D8F"/>
  <circle cx="46" cy="40" r="4" fill="#2A9D8F"/>

  <!-- pubmlp text -->
  <text x="62" y="42" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.5" fill="#1A4A73">pubmlp</text>
</svg>
